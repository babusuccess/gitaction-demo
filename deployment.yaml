apiVersion: apps/v1
kind: Deployment

metadata:
  name: babu-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: babu-app

  template:
    metadata:
      labels:
        app: babu-app

    spec:
      containers:
      - name: babu-container
        image: babugyadav/nginx:mytestimage
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service

metadata:
  name: babu-service

spec:
  type: NodePort

  selector:
    app: babu-app

  ports:
  - port: 80
    targetPort: 80
    nodePort: 30007
