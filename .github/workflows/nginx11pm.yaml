name: Setup NGINX on all nodes

on:
  push:
    branches:
      - main

jobs:
  setup-nginx:
    runs-on: self-hosted  # Your self-hosted runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install NGINX on all nodes
        run: |
          for ip in 192.168.8.100 192.168.8.101 192.168.8.102; do
            # Map IP to correct user
            if [ "$ip" = "192.168.8.100" ]; then user="master"; fi
            if [ "$ip" = "192.168.8.101" ]; then user="worker"; fi
            if [ "$ip" = "192.168.8.102" ]; then user="worker2"; fi

            echo "Installing NGINX on $ip as $user..."

            ssh -o StrictHostKeyChecking=no $user@$ip "
              sudo apt update -y &&
              sudo apt install -y nginx &&
              sudo systemctl enable --now nginx &&
              echo 'This is GitHub Actions NGINX server' | sudo tee /var/www/html/index.html
            "
          done
