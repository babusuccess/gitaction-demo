name: Clone Another Repo

on:
  push:
    branches: [ "main" ]

jobs:
  clone:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout current repo
      uses: actions/checkout@v4

    - name: Clone another repo
      run: git clone https://github.com/babusuccess/gitaction-demo.git

    - name: List files
      run: ls -l
