name: Build and Deploy to NGINX

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted   # 👈 runs on your local server

    steps:
      # Step 1: Checkout code
      - name: Checkout repo
        uses: actions/checkout@v4

      # Step 2: Build HTML
      - name: Build HTML
        run: |
          echo "Building HTML..."
          mkdir -p build
          echo "<html><h1>Welcome to Kubernetes Eng Babu</h1></html>" > build/index.html
          ls -la build

      # Step 3: Install NGINX (if not installed)
      - name: Install NGINX
        run: |
          sudo apt update
          sudo apt install -y nginx

      # Step 4: Deploy to NGINX
      - name: Deploy HTML to NGINX
        run: |
          echo "Deploying to NGINX..."
          sudo cp build/index.html /var/www/html/index.html
          sudo chmod 644 /var/www/html/index.html

      # Step 5: Restart NGINX
      - name: Restart NGINX
        run: |
          sudo systemctl restart nginx

      # Step 6: Check NGINX Status
      - name: Check NGINX Status
        run: |
          sudo systemctl status nginx --no-pager

      # Step 7: Done
      - name: Done
        run: echo "Deployment completed successfully!"

