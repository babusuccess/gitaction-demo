name: Build and Deploy to NGINX (Local Server)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted   # 👈 IMPORTANT (runs on your server)

    steps:
      # Step 1: Checkout code
      - name: Checkout repo
        uses: actions/checkout@v4

      # Step 2: Build HTML
      - name: Build HTML
        run: |
          echo "Building HTML..."
          mkdir -p build
          echo "<html><h1>Welcome to Kubernetes Eng Babu</h1></html>" > build/index.html
          ls -la build

      # Step 3: Deploy to NGINX
      - name: Deploy to NGINX
        run: |
          echo "Installing NGINX if not present..."
          sudo apt update
          sudo apt install -y nginx

          echo "Copying HTML to NGINX directory..."
          sudo cp build/index.html /var/www/html/index.html

          echo "Setting permissions..."
          sudo chmod 644 /var/www/html/index.html

          echo "Restarting NGINX..."
          sudo systemctl restart nginx

          echo "Checking NGINX status..."
          sudo systemctl status nginx --no-pager

          echo "Deployment completed successfully!"
