name: Setup NGINX on Master Node

on:
  push:
    branches:
      - main

jobs:
  setup-nginx:
    runs-on: self-hosted  # Your self-hosted runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install NGINX on master node
        run: |
          echo "Installing NGINX on 192.168.8.100 as root..."
          ssh -o StrictHostKeyChecking=no root@192.168.8.100 "
            apt update -y &&
            apt install -y nginx &&
            systemctl enable --now nginx &&
            echo 'This is GitHub Actions NGINX server' > /var/www/html/index.html
          "
